services:
  - type: web
    name: wine-advisor-app
    runtime: node
    rootDir: .
    buildCommand: cd wine-advisor && npm install && npm run build
    startCommand: cd wine-advisor && npm run start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: "20.17.0"
